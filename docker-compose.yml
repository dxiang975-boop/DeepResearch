services:
  postgres:
    image: postgres:16
    container_name: deepresearch-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: RootPass123
      POSTGRES_DB: deepresearch
    ports:
      - "5432:5432"
    volumes:
      - deepresearch-postgres-data:/var/lib/postgresql/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: deepresearch-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - deepresearch-etcd-data:/etcd

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: deepresearch-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - deepresearch-minio-data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: deepresearch-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - deepresearch-milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

volumes:
  deepresearch-postgres-data:
  deepresearch-etcd-data:
  deepresearch-minio-data:
  deepresearch-milvus-data: